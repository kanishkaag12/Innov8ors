<svg viewBox="0 0 520 380" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Background glow blobs -->
  <ellipse cx="260" cy="190" rx="230" ry="170" fill="white" fill-opacity="0.05"/>
  <circle cx="100" cy="80" r="60" fill="white" fill-opacity="0.06"/>
  <circle cx="420" cy="300" r="80" fill="white" fill-opacity="0.06"/>

  <!-- Desk surface -->
  <rect x="80" y="250" width="360" height="12" rx="6" fill="white" fill-opacity="0.25"/>

  <!-- Laptop base -->
  <rect x="145" y="222" width="230" height="10" rx="5" fill="white" fill-opacity="0.4"/>

  <!-- Laptop screen body -->
  <rect x="150" y="120" width="220" height="108" rx="10" fill="white" fill-opacity="0.18" stroke="white" stroke-opacity="0.4" stroke-width="2"/>

  <!-- Screen content: chart bars -->
  <rect x="170" y="188" width="18" height="28" rx="3" fill="white" fill-opacity="0.55"/>
  <rect x="196" y="174" width="18" height="42" rx="3" fill="white" fill-opacity="0.7"/>
  <rect x="222" y="162" width="18" height="54" rx="3" fill="white" fill-opacity="0.85"/>
  <rect x="248" y="178" width="18" height="38" rx="3" fill="white" fill-opacity="0.65"/>
  <rect x="274" y="155" width="18" height="61" rx="3" fill="white" fill-opacity="0.9"/>
  <rect x="300" y="168" width="18" height="48" rx="3" fill="white" fill-opacity="0.75"/>

  <!-- Screen header row -->
  <rect x="170" y="133" width="80" height="8" rx="4" fill="white" fill-opacity="0.6"/>
  <circle cx="332" cy="137" r="6" fill="white" fill-opacity="0.4"/>
  <circle cx="348" cy="137" r="6" fill="white" fill-opacity="0.25"/>

  <!-- Person: head -->
  <circle cx="260" cy="86" r="26" fill="white" fill-opacity="0.9"/>
  <!-- Person: torso -->
  <path d="M230 115 Q260 108 290 115 L298 120 V148 L222 148 V120 Z" fill="white" fill-opacity="0.85" rx="10"/>
  <!-- Collar/shirt detail -->
  <path d="M248 116 L260 128 L272 116" stroke="rgba(13,148,136,0.7)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Floating shield with check (left) -->
  <g transform="translate(68, 148)">
    <path d="M28 0 L56 10 L56 32 Q56 52 28 62 Q0 52 0 32 L0 10 Z" fill="white" fill-opacity="0.22" stroke="white" stroke-opacity="0.55" stroke-width="1.5"/>
    <path d="M14 32 L24 42 L42 22" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Floating document card (right) -->
  <g transform="translate(386, 140)">
    <rect width="68" height="82" rx="8" fill="white" fill-opacity="0.22" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>
    <rect x="10" y="16" width="48" height="5" rx="2.5" fill="white" fill-opacity="0.65"/>
    <rect x="10" y="28" width="40" height="5" rx="2.5" fill="white" fill-opacity="0.5"/>
    <rect x="10" y="40" width="44" height="5" rx="2.5" fill="white" fill-opacity="0.5"/>
    <rect x="10" y="52" width="32" height="5" rx="2.5" fill="white" fill-opacity="0.4"/>
    <!-- Checkmark stamp -->
    <circle cx="48" cy="66" r="9" fill="white" fill-opacity="0.35"/>
    <path d="M42 66 L46 70 L54 62" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Floating coin (top right) -->
  <g transform="translate(408, 88)">
    <circle cx="18" cy="18" r="18" fill="white" fill-opacity="0.28" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>
    <circle cx="18" cy="18" r="12" fill="white" fill-opacity="0.18"/>
    <text x="12" y="23" font-size="14" fill="white" fill-opacity="0.8" font-family="sans-serif" font-weight="bold">$</text>
  </g>

  <!-- Floating coin (bottom left) -->
  <g transform="translate(82, 280)">
    <circle cx="14" cy="14" r="14" fill="white" fill-opacity="0.22" stroke="white" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="8" y="19" font-size="11" fill="white" fill-opacity="0.7" font-family="sans-serif" font-weight="bold">$</text>
  </g>

  <!-- Floating tag/label (top left) -->
  <g transform="translate(72, 200)">
    <rect width="54" height="28" rx="14" fill="white" fill-opacity="0.2" stroke="white" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="14" y="18" font-size="10" fill="white" fill-opacity="0.9" font-family="sans-serif" font-weight="600">✓ Paid</text>
  </g>

  <!-- Milestone dots connected by dashed line -->
  <line x1="160" y1="315" x2="360" y2="315" stroke="white" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="6 4"/>
  <circle cx="160" cy="315" r="6" fill="white" fill-opacity="0.75"/>
  <circle cx="230" cy="315" r="6" fill="white" fill-opacity="0.75"/>
  <circle cx="295" cy="315" r="6" fill="white" fill-opacity="0.5"/>
  <circle cx="360" cy="315" r="6" fill="white" fill-opacity="0.3" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="150" y="335" font-size="9" fill="white" fill-opacity="0.7" font-family="sans-serif">M1</text>
  <text x="220" y="335" font-size="9" fill="white" fill-opacity="0.7" font-family="sans-serif">M2</text>
  <text x="285" y="335" font-size="9" fill="white" fill-opacity="0.5" font-family="sans-serif">M3</text>
  <text x="350" y="335" font-size="9" fill="white" fill-opacity="0.3" font-family="sans-serif">M4</text>
</svg>
